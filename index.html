<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#f5efe6">
<title>My Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#f5efe6;--card:#fff;--accent:#e8724a;--accent2:#c9b99a;--text:#2d1f0e;--muted:#a08c75;--border:#e8dfd4;--shadow:0 2px 14px rgba(0,0,0,0.08)}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{min-height:100vh;background:var(--bg);font-family:'Lato',sans-serif;color:var(--text)}
body{background-image:radial-gradient(circle at 15% 15%,#fde8d8 0%,transparent 50%),radial-gradient(circle at 85% 85%,#e8dfd4 0%,transparent 50%);padding-bottom:100px}
.header{max-width:480px;margin:0 auto;padding:36px 22px 0}
.header-top{display:flex;justify-content:space-between;align-items:flex-start}
.date-label{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase;margin-bottom:5px}
h1{font-family:'Playfair Display',serif;font-size:34px;font-weight:700;color:var(--text);line-height:1.1}
.count-label{margin-top:5px;font-size:14px;color:var(--muted);font-weight:300}
.bell-btn{background:rgba(255,255,255,0.75);border:none;border-radius:14px;padding:10px 14px;cursor:pointer;color:var(--muted);display:flex;align-items:center;gap:6px;font-size:13px;font-family:'Lato',sans-serif;box-shadow:var(--shadow);transition:all .2s;white-space:nowrap;flex-shrink:0;margin-top:4px}
.bell-btn.active{background:var(--accent);color:white}
.settings-panel{background:white;border-radius:18px;padding:20px;margin-top:16px;box-shadow:0 4px 24px rgba(0,0,0,0.1);animation:fadeDown .2s ease}
.settings-title{font-size:14px;font-weight:700;color:var(--text);margin-bottom:14px}
.time-row{display:flex;align-items:center;gap:12px;margin-bottom:14px}
.time-row label{font-size:13px;color:var(--muted);white-space:nowrap}
input[type="time"]{flex:1;border:2px solid var(--border);border-radius:10px;padding:8px 12px;font-size:15px;font-family:'Lato',sans-serif;color:var(--text);background:#faf7f3;outline:none}
.enable-btn{width:100%;background:var(--accent);color:white;border:none;border-radius:12px;padding:13px;font-size:14px;font-family:'Lato',sans-serif;font-weight:700;cursor:pointer}
.notif-ok{background:#f0faf0;border:1.5px solid #a8d8a8;border-radius:12px;padding:11px 14px;font-size:13px;color:#2d7a2d;text-align:center}
.settings-hint{font-size:11px;color:#b0a090;margin-top:12px;line-height:1.6}
.input-row{display:flex;gap:10px;background:white;border-radius:18px;padding:6px 6px 6px 18px;box-shadow:0 4px 20px rgba(0,0,0,0.09);align-items:center;margin-top:22px}
.input-row input{flex:1;border:none;outline:none;font-size:16px;font-family:'Lato',sans-serif;color:var(--text);background:transparent;padding:10px 0}
.input-row input::placeholder{color:var(--accent2)}
.add-btn{background:var(--accent);border:none;border-radius:13px;width:46px;height:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:white;transition:all .2s;flex-shrink:0;font-size:26px;font-weight:300;line-height:1}
.add-btn:disabled{background:var(--border);color:var(--accent2);cursor:default}
.list-wrap{max-width:480px;margin:0 auto;padding:20px 22px 0}
.empty-state{text-align:center;color:var(--accent2);font-size:15px;padding:56px 0;line-height:1.8;font-weight:300}
.empty-icon{font-size:44px;display:block;margin-bottom:12px}
.task-card{display:flex;align-items:center;gap:14px;background:white;border-radius:15px;padding:15px 14px;margin-bottom:10px;box-shadow:var(--shadow);border:1.5px solid transparent;transition:all .25s ease;animation:slideIn .28s ease}
.task-card.done{background:rgba(255,255,255,0.5);box-shadow:none;border-color:var(--border);opacity:.6}
.check-btn{background:none;border:none;padding:0;cursor:pointer;flex-shrink:0;display:flex;align-items:center}
.check-circle{width:24px;height:24px;border-radius:50%;border:2px solid var(--accent2);display:flex;align-items:center;justify-content:center;transition:all .22s;background:transparent;flex-shrink:0}
.task-card.done .check-circle{background:var(--accent);border-color:var(--accent)}
.check-circle::after{content:'';display:none;width:6px;height:10px;border-right:2.5px solid white;border-bottom:2.5px solid white;transform:rotate(45deg) translateY(-1px)}
.task-card.done .check-circle::after{display:block}
.task-text{flex:1;font-size:16px;color:var(--text);line-height:1.45;word-break:break-word;transition:all .2s}
.task-card.done .task-text{text-decoration:line-through;color:var(--muted)}
.del-btn{background:none;border:none;padding:5px;cursor:pointer;color:var(--border);display:flex;flex-shrink:0;border-radius:8px;transition:color .15s}
.del-btn:active{color:var(--accent)}
.done-header{display:flex;justify-content:space-between;align-items:center;margin:28px 0 10px}
.done-label{font-size:11px;letter-spacing:.15em;color:var(--muted);text-transform:uppercase}
.clear-btn{background:none;border:none;color:#c9765a;font-size:12px;cursor:pointer;font-family:'Lato',sans-serif;padding:0;text-decoration:underline}
@keyframes fadeDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideIn{from{opacity:0;transform:translateY(-10px) scale(.98)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div class="header">
  <div class="header-top">
    <div>
      <div class="date-label" id="dateLabel"></div>
      <h1>My Tasks</h1>
      <div class="count-label" id="countLabel">Loading…</div>
    </div>
    <button class="bell-btn" id="bellBtn" onclick="toggleSettings()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
      Remind
    </button>
  </div>
  <div class="settings-panel" id="settingsPanel" style="display:none">
    <div class="settings-title">Daily Reminder</div>
    <div class="time-row">
      <label for="timeInput">Remind me at:</label>
      <input type="time" id="timeInput" value="09:00" onchange="saveSettings()">
    </div>
    <div id="notifArea"></div>
    <div class="settings-hint">💡 Open in Chrome → tap ⋮ menu → "Add to Home screen"</div>
  </div>
  <div class="input-row">
    <input type="text" id="taskInput" placeholder="Add a new task…" onkeydown="if(event.key==='Enter')addTask()" oninput="updateAddBtn()">
    <button class="add-btn" id="addBtn" onclick="addTask()" disabled>+</button>
  </div>
</div>
<div class="list-wrap" id="listWrap"></div>
<script>
let todos=[],settings={reminderTime:'09:00'},showSettings=false,reminderTimer=null;
function init(){
  try{todos=JSON.parse(localStorage.getItem('garry-todos')||'[]')}catch{}
  try{settings=JSON.parse(localStorage.getItem('garry-settings')||'{"reminderTime":"09:00"}')}catch{}
  document.getElementById('timeInput').value=settings.reminderTime||'09:00';
  updateDate();render();updateNotifArea();scheduleReminder();
  setInterval(updateDate,60000);
}
function save(){localStorage.setItem('garry-todos',JSON.stringify(todos))}
function saveSettings(){
  settings.reminderTime=document.getElementById('timeInput').value;
  localStorage.setItem('garry-settings',JSON.stringify(settings));
  scheduleReminder();updateNotifArea();
}
function updateDate(){
  const now=new Date();
  document.getElementById('dateLabel').textContent=now.toLocaleDateString('en-CA',{weekday:'long',month:'long',day:'numeric'});
  const pending=todos.filter(t=>!t.done).length;
  document.getElementById('countLabel').textContent=pending===0?(todos.length?'All done! 🎉':'No tasks yet'):`${pending} task${pending!==1?'s':''} remaining`;
}
function render(){
  const wrap=document.getElementById('listWrap');
  const pending=todos.filter(t=>!t.done);
  const done=todos.filter(t=>t.done);
  let html='';
  if(todos.length===0){html=`<div class="empty-state"><span class="empty-icon">📝</span>No tasks yet.<br>Add something above!</div>`}
  else{
    pending.forEach(t=>{html+=taskHTML(t)});
    if(done.length){
      html+=`<div class="done-header"><span class="done-label">Completed (${done.length})</span><button class="clear-btn" onclick="clearDone()">Clear all</button></div>`;
      done.forEach(t=>{html+=taskHTML(t)});
    }
  }
  wrap.innerHTML=html;updateDate();
}
function taskHTML(t){
  return `<div class="task-card${t.done?' done':''}" id="card-${t.id}">
    <button class="check-btn" onclick="toggleTodo(${t.id})"><div class="check-circle"></div></button>
    <span class="task-text">${escHtml(t.text)}</span>
    <button class="del-btn" onclick="deleteTodo(${t.id})">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
    </button>
  </div>`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;')}
function addTask(){
  const input=document.getElementById('taskInput');
  const text=input.value.trim();
  if(!text)return;
  todos.unshift({id:Date.now(),text,done:false});
  save();input.value='';updateAddBtn();render();input.focus();
}
function toggleTodo(id){const t=todos.find(x=>x.id===id);if(t){t.done=!t.done;save();render()}}
function deleteTodo(id){todos=todos.filter(x=>x.id!==id);save();render()}
function clearDone(){todos=todos.filter(t=>!t.done);save();render()}
function updateAddBtn(){document.getElementById('addBtn').disabled=!document.getElementById('taskInput').value.trim()}
function toggleSettings(){
  showSettings=!showSettings;
  document.getElementById('settingsPanel').style.display=showSettings?'block':'none';
  document.getElementById('bellBtn').classList.toggle('active',showSettings);
}
function updateNotifArea(){
  const area=document.getElementById('notifArea');
  if(!('Notification' in window)){area.innerHTML='<div style="font-size:13px;color:#a08c75;">Notifications not supported.</div>';return}
  if(Notification.permission==='granted'){area.innerHTML=`<div class="notif-ok">✅ Notifications on — reminder set for ${settings.reminderTime}</div>`}
  else if(Notification.permission==='denied'){area.innerHTML='<div style="font-size:13px;color:#c94a2a;">Notifications blocked in browser settings.</div>'}
  else{area.innerHTML='<button class="enable-btn" onclick="enableNotifs()">Enable Notifications</button>'}
}
async function enableNotifs(){
  if(!('Notification' in window))return;
  await Notification.requestPermission();
  updateNotifArea();scheduleReminder();
}
function scheduleReminder(){
  if(reminderTimer)clearTimeout(reminderTimer);
  if(!('Notification' in window)||Notification.permission!=='granted')return;
  const[h,m]=(settings.reminderTime||'09:00').split(':').map(Number);
  const now=new Date(),target=new Date();
  target.setHours(h,m,0,0);
  let diff=target-now;
  if(diff<=0)diff+=86400000;
  reminderTimer=setTimeout(()=>{
    const pending=todos.filter(t=>!t.done);
    if(pending.length>0)new Notification('📋 Daily Tasks Reminder',{body:`You have ${pending.length} task${pending.length!==1?'s':''} still to do!`,tag:'daily-tasks'});
    scheduleReminder();
  },diff);
}
init();
</script>
</body>
</html>
